<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Jarvis">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#38bdf8">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icon.svg">
  <title>Jarvis</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d1a;
      color: #e0e0e0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #111827;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1e3a5f;
      flex-shrink: 0;
      gap: 8px;
    }

    header h1 { font-size: 1.1rem; color: #38bdf8; letter-spacing: 0.05em; flex-shrink: 0; }

    .header-right { display: flex; gap: 6px; align-items: center; }

    /* Toggle local / groq */
    #backend-toggle {
      display: flex;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid #1e3a5f;
    }

    .backend-btn {
      padding: 5px 10px;
      font-size: 0.72rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      background: transparent;
      color: #6b7280;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }

    .backend-btn.active-ollama { background: #1e3a5f; color: #38bdf8; }
    .backend-btn.active-groq   { background: #4c1d95; color: #a78bfa; }
    .backend-btn:disabled      { opacity: 0.35; cursor: not-allowed; }

    #reset-btn {
      background: transparent;
      border: 1px solid #374151;
      color: #9ca3af;
      padding: 5px 10px;
      border-radius: 14px;
      font-size: 0.72rem;
      cursor: pointer;
      white-space: nowrap;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
    }

    .bubble {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 18px;
      line-height: 1.55;
      font-size: 0.93rem;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .bubble.user {
      background: #1e40af;
      color: #e0e0e0;
      align-self: flex-end;
      border-bottom-right-radius: 5px;
    }

    .bubble.jarvis {
      background: #111827;
      color: #e0e0e0;
      align-self: flex-start;
      border-bottom-left-radius: 5px;
      border: 1px solid #1e3a5f;
    }

    .bubble.jarvis.from-groq { border-color: #4c1d95; }

    .bubble.jarvis .label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 5px;
    }

    .label-ollama { color: #38bdf8; }
    .label-groq   { color: #a78bfa; }

    .typing {
      display: flex; gap: 5px; align-items: center;
      padding: 14px 16px;
    }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #38bdf8;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.35; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    #input-area {
      padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      background: #111827;
      border-top: 1px solid #1e3a5f;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #message-input {
      flex: 1;
      background: #0d0d1a;
      border: 1px solid #1e3a5f;
      border-radius: 22px;
      padding: 10px 16px;
      color: #e0e0e0;
      font-size: 0.95rem;
      resize: none;
      max-height: 110px;
      outline: none;
      line-height: 1.4;
    }
    #message-input::placeholder { color: #4b5563; }

    .action-btn {
      width: 44px; height: 44px;
      border-radius: 50%; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
      transition: transform 0.1s;
    }
    .action-btn:active { transform: scale(0.9); }

    #voice-btn { background: #1e3a5f; }
    #voice-btn.listening { background: #dc2626; animation: pulse 1s infinite; }
    #send-btn { background: #38bdf8; color: #000; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.4); }
      50%       { box-shadow: 0 0 0 8px rgba(220,38,38,0); }
    }
  </style>
</head>
<body>

<header>
  <h1>⚡ JARVIS</h1>
  <div class="header-right">
    <div id="backend-toggle">
      <button class="backend-btn active-ollama" id="btn-ollama" onclick="switchBackend('ollama')">📱 Local</button>
      <button class="backend-btn {% if not groq_available %}{% endif %}" id="btn-groq"
              onclick="switchBackend('groq')" {% if not groq_available %}disabled title="Définir GROQ_API_KEY"{% endif %}>
        ☁️ Groq
      </button>
    </div>
    <button id="reset-btn">Effacer</button>
  </div>
</header>

<div id="messages">
  <div class="bubble jarvis">
    <div class="label label-ollama">JARVIS — LOCAL</div>Bonjour ! Comment puis-je vous aider ?
  </div>
</div>

<div id="input-area">
  <button class="action-btn" id="voice-btn" title="Vocal">🎤</button>
  <textarea id="message-input" placeholder="Votre message…" rows="1"></textarea>
  <button class="action-btn" id="send-btn" title="Envoyer">▶</button>
</div>

<script>
  const msgBox   = document.getElementById('messages');
  const input    = document.getElementById('message-input');
  const sendBtn  = document.getElementById('send-btn');
  const voiceBtn = document.getElementById('voice-btn');
  const resetBtn = document.getElementById('reset-btn');

  let busy = false;
  let currentBackend = 'ollama';

  // ── Backend toggle ────────────────────────────────────────────────────────
  async function switchBackend(b) {
    if (b === currentBackend) return;
    const res  = await fetch('/backend', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ backend: b }),
    });
    if (!res.ok) { alert('Groq non disponible : GROQ_API_KEY non définie.'); return; }
    currentBackend = b;

    document.getElementById('btn-ollama').className =
      'backend-btn' + (b === 'ollama' ? ' active-ollama' : '');
    document.getElementById('btn-groq').className =
      'backend-btn' + (b === 'groq' ? ' active-groq' : '');

    msgBox.innerHTML = '';
    const label = b === 'groq' ? 'JARVIS — GROQ ☁️' : 'JARVIS — LOCAL 📱';
    const cls   = b === 'groq' ? 'label-groq' : 'label-ollama';
    addBubble(`Basculé en mode ${b === 'groq' ? 'Groq (intelligent)' : 'Local (phi3:mini)'}.`, b);
  }

  // ── Auto-resize textarea ──────────────────────────────────────────────────
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 110) + 'px';
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener('click', send);

  function escape(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function addBubble(text, backend) {
    const d = document.createElement('div');
    const isGroq = backend === 'groq';
    d.className = 'bubble jarvis' + (isGroq ? ' from-groq' : '');
    const labelCls  = isGroq ? 'label-groq' : 'label-ollama';
    const labelText = isGroq ? 'JARVIS — GROQ ☁️' : 'JARVIS — LOCAL 📱';
    d.innerHTML = `<div class="label ${labelCls}">${labelText}</div>${escape(text)}`;
    msgBox.appendChild(d);
    msgBox.scrollTop = msgBox.scrollHeight;
    return d;
  }

  function addUserBubble(text) {
    const d = document.createElement('div');
    d.className = 'bubble user';
    d.textContent = text;
    msgBox.appendChild(d);
    msgBox.scrollTop = msgBox.scrollHeight;
  }

  function showTyping() {
    const d = document.createElement('div');
    d.className = 'bubble jarvis typing';
    d.id = 'typing';
    d.innerHTML = '<span></span><span></span><span></span>';
    msgBox.appendChild(d);
    msgBox.scrollTop = msgBox.scrollHeight;
  }
  function hideTyping() { document.getElementById('typing')?.remove(); }

  async function send() {
    const text = input.value.trim();
    if (!text || busy) return;
    input.value = '';
    input.style.height = 'auto';
    busy = true;

    addUserBubble(text);
    showTyping();

    try {
      const res  = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });
      const data = await res.json();
      hideTyping();
      addBubble(data.reply ?? data.error, data.backend ?? currentBackend);
      speak(data.reply ?? '');
    } catch {
      hideTyping();
      addBubble('Impossible de joindre Jarvis. Le serveur est-il démarré ?', currentBackend);
    }
    busy = false;
  }

  // ── Synthèse vocale ───────────────────────────────────────────────────────
  function speak(text) {
    if (!text || !window.speechSynthesis) return;
    speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'fr-FR';
    speechSynthesis.speak(utt);
  }

  // ── Reconnaissance vocale ─────────────────────────────────────────────────
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SR) {
    const rec = new SR();
    rec.lang = 'fr-FR';
    rec.interimResults = false;
    rec.onresult = e => {
      input.value = e.results[0][0].transcript;
      voiceBtn.classList.remove('listening');
      send();
    };
    rec.onerror = rec.onend = () => voiceBtn.classList.remove('listening');
    voiceBtn.addEventListener('click', () => {
      if (voiceBtn.classList.contains('listening')) { rec.stop(); }
      else { voiceBtn.classList.add('listening'); rec.start(); }
    });
  } else {
    voiceBtn.style.opacity = '0.3';
    voiceBtn.title = 'Voix non disponible';
  }

  // ── Réinitialisation ──────────────────────────────────────────────────────
  resetBtn.addEventListener('click', async () => {
    await fetch('/reset', { method: 'POST' });
    msgBox.innerHTML = '';
    addBubble('Conversation effacée.', currentBackend);
  });

  // ── PWA ───────────────────────────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
