<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Jarvis">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#38bdf8">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icon.svg">
  <title>Jarvis</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d1a;
      color: #e0e0e0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #111827;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1e3a5f;
      flex-shrink: 0;
      gap: 8px;
    }

    header h1 { font-size: 1.1rem; color: #38bdf8; letter-spacing: 0.05em; flex-shrink: 0; }

    .header-right { display: flex; gap: 6px; align-items: center; }

    #backend-toggle {
      display: flex;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid #1e3a5f;
    }

    .backend-btn {
      padding: 5px 10px;
      font-size: 0.72rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      background: transparent;
      color: #6b7280;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .backend-btn.active-ollama { background: #1e3a5f; color: #38bdf8; }
    .backend-btn.active-groq   { background: #4c1d95; color: #a78bfa; }
    .backend-btn:disabled      { opacity: 0.35; cursor: not-allowed; }

    #reset-btn {
      background: transparent;
      border: 1px solid #374151;
      color: #9ca3af;
      padding: 5px 10px;
      border-radius: 14px;
      font-size: 0.72rem;
      cursor: pointer;
      white-space: nowrap;
    }

    /* ── Tab bar ── */
    #tab-bar {
      display: flex;
      background: #111827;
      border-bottom: 1px solid #1e3a5f;
      flex-shrink: 0;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 0.82rem;
      font-weight: 600;
      color: #6b7280;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab.active { color: #38bdf8; border-bottom-color: #38bdf8; }

    /* ── Views ── */
    #view-chat, #view-history {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    #view-history { display: none; }

    /* ── Chat bubbles ── */
    #messages {
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 100%;
    }

    .bubble {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 18px;
      line-height: 1.55;
      font-size: 0.93rem;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .bubble.user {
      background: #1e40af;
      color: #e0e0e0;
      align-self: flex-end;
      border-bottom-right-radius: 5px;
    }
    .bubble.jarvis {
      background: #111827;
      color: #e0e0e0;
      align-self: flex-start;
      border-bottom-left-radius: 5px;
      border: 1px solid #1e3a5f;
    }
    .bubble.jarvis.from-groq { border-color: #4c1d95; }

    .bubble .label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 5px;
    }
    .label-ollama { color: #38bdf8; }
    .label-groq   { color: #a78bfa; }

    .typing { display: flex; gap: 5px; align-items: center; padding: 14px 16px; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #38bdf8; animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.35; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── History view ── */
    #history-list {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .hist-date {
      font-size: 0.7rem;
      color: #4b5563;
      text-align: center;
      padding: 10px 0 4px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .hist-msg {
      padding: 9px 13px;
      border-radius: 14px;
      font-size: 0.88rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
      max-width: 88%;
    }
    .hist-msg.user   { background: #1e3a5f; align-self: flex-end; color: #cbd5e1; }
    .hist-msg.jarvis { background: #111827; border: 1px solid #1e3a5f; align-self: flex-start; color: #e0e0e0; }

    .hist-time {
      font-size: 0.65rem;
      color: #6b7280;
      margin-top: 2px;
      padding: 0 4px;
    }
    .hist-time.right { text-align: right; align-self: flex-end; }

    #history-empty {
      text-align: center;
      color: #4b5563;
      padding: 60px 20px;
      font-size: 0.9rem;
    }

    /* ── Input area ── */
    #input-area {
      padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      background: #111827;
      border-top: 1px solid #1e3a5f;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #message-input {
      flex: 1;
      background: #0d0d1a;
      border: 1px solid #1e3a5f;
      border-radius: 22px;
      padding: 10px 16px;
      color: #e0e0e0;
      font-size: 0.95rem;
      resize: none;
      max-height: 110px;
      outline: none;
      line-height: 1.4;
    }
    #message-input::placeholder { color: #4b5563; }

    .action-btn {
      width: 44px; height: 44px;
      border-radius: 50%; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
      transition: transform 0.1s;
    }
    .action-btn:active { transform: scale(0.9); }
    #voice-btn { background: #1e3a5f; }
    #voice-btn.listening { background: #dc2626; animation: pulse 1s infinite; }
    #send-btn { background: #38bdf8; color: #000; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.4); }
      50%       { box-shadow: 0 0 0 8px rgba(220,38,38,0); }
    }
  </style>
</head>
<body>

<header>
  <h1>⚡ JARVIS</h1>
  <div class="header-right">
    <div id="backend-toggle">
      <button class="backend-btn active-ollama" id="btn-ollama" onclick="switchBackend('ollama')">📱 Local</button>
      <button class="backend-btn" id="btn-groq"
              onclick="switchBackend('groq')" {% if not groq_available %}disabled title="Définir GROQ_API_KEY"{% endif %}>
        ☁️ Groq
      </button>
    </div>
    <button id="reset-btn">Effacer</button>
  </div>
</header>

<div id="tab-bar">
  <div class="tab active" id="tab-chat" onclick="showTab('chat')">💬 Chat</div>
  <div class="tab" id="tab-history" onclick="showTab('history')">📋 Historique</div>
</div>

<!-- Vue Chat -->
<div id="view-chat">
  <div id="messages">
    {% if history %}
      {% for msg in history %}
        {% if msg.role == "user" %}
          <div class="bubble user">{{ msg.content }}</div>
        {% else %}
          <div class="bubble jarvis">
            <div class="label label-ollama">JARVIS</div>{{ msg.content }}
          </div>
        {% endif %}
      {% endfor %}
    {% else %}
      <div class="bubble jarvis">
        <div class="label label-ollama">JARVIS — LOCAL</div>Bonjour ! Comment puis-je vous aider ?
      </div>
    {% endif %}
  </div>
</div>

<!-- Vue Historique -->
<div id="view-history">
  <div id="history-list">
    <div id="history-empty">Chargement…</div>
  </div>
</div>

<div id="input-area">
  <button class="action-btn" id="voice-btn" title="Vocal">🎤</button>
  <textarea id="message-input" placeholder="Votre message…" rows="1"></textarea>
  <button class="action-btn" id="send-btn" title="Envoyer">▶</button>
</div>

<script>
  const msgBox   = document.getElementById('messages');
  const input    = document.getElementById('message-input');
  const sendBtn  = document.getElementById('send-btn');
  const voiceBtn = document.getElementById('voice-btn');
  const resetBtn = document.getElementById('reset-btn');

  let busy = false;
  let currentBackend = 'ollama';

  // Scroll au dernier message au chargement
  document.getElementById('view-chat').scrollTop = 99999;

  // ── Onglets ───────────────────────────────────────────────────────────────
  function showTab(tab) {
    document.getElementById('view-chat').style.display    = tab === 'chat'    ? 'block' : 'none';
    document.getElementById('view-history').style.display = tab === 'history' ? 'block' : 'none';
    document.getElementById('input-area').style.display   = tab === 'chat'    ? 'flex'  : 'none';
    document.getElementById('tab-chat').className    = 'tab' + (tab === 'chat'    ? ' active' : '');
    document.getElementById('tab-history').className = 'tab' + (tab === 'history' ? ' active' : '');
    if (tab === 'history') loadHistory();
  }

  // ── Historique ────────────────────────────────────────────────────────────
  async function loadHistory() {
    const list = document.getElementById('history-list');
    const res  = await fetch('/history');
    const msgs = await res.json();

    if (!msgs.length) {
      list.innerHTML = '<div id="history-empty">Aucune conversation enregistrée.</div>';
      return;
    }

    list.innerHTML = '';
    list.style.display = 'flex';
    list.style.flexDirection = 'column';

    let lastDate = '';
    msgs.forEach(m => {
      const ts   = m.ts ? new Date(m.ts) : null;
      const date = ts ? ts.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' }) : '';
      const time = ts ? ts.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' }) : '';

      if (date && date !== lastDate) {
        const d = document.createElement('div');
        d.className = 'hist-date';
        d.textContent = date;
        list.appendChild(d);
        lastDate = date;
      }

      const isUser = m.role === 'user';
      const el = document.createElement('div');
      el.className = `hist-msg ${isUser ? 'user' : 'jarvis'}`;
      el.textContent = m.content;
      list.appendChild(el);

      if (time) {
        const t = document.createElement('div');
        t.className = 'hist-time' + (isUser ? ' right' : '');
        t.textContent = time;
        list.appendChild(t);
      }
    });

    list.scrollTop = list.scrollHeight;
  }

  // ── Backend toggle ────────────────────────────────────────────────────────
  async function switchBackend(b) {
    if (b === currentBackend) return;
    const res = await fetch('/backend', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ backend: b }),
    });
    if (!res.ok) { alert('Groq non disponible : GROQ_API_KEY non définie.'); return; }
    currentBackend = b;
    document.getElementById('btn-ollama').className = 'backend-btn' + (b === 'ollama' ? ' active-ollama' : '');
    document.getElementById('btn-groq').className   = 'backend-btn' + (b === 'groq'   ? ' active-groq'   : '');
  }

  // ── Auto-resize textarea ──────────────────────────────────────────────────
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 110) + 'px';
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener('click', send);

  function escape(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function addBubble(text, backend) {
    const d = document.createElement('div');
    const isGroq = backend === 'groq';
    d.className = 'bubble jarvis' + (isGroq ? ' from-groq' : '');
    d.innerHTML = `<div class="label ${isGroq ? 'label-groq' : 'label-ollama'}">${isGroq ? 'JARVIS — GROQ ☁️' : 'JARVIS — LOCAL 📱'}</div>${escape(text)}`;
    msgBox.appendChild(d);
    msgBox.scrollTop = msgBox.scrollHeight;
  }

  function addUserBubble(text) {
    const d = document.createElement('div');
    d.className = 'bubble user';
    d.textContent = text;
    msgBox.appendChild(d);
    msgBox.scrollTop = msgBox.scrollHeight;
  }

  function showTyping() {
    const d = document.createElement('div');
    d.className = 'bubble jarvis typing'; d.id = 'typing';
    d.innerHTML = '<span></span><span></span><span></span>';
    msgBox.appendChild(d);
    msgBox.scrollTop = msgBox.scrollHeight;
  }
  function hideTyping() { document.getElementById('typing')?.remove(); }

  async function send() {
    const text = input.value.trim();
    if (!text || busy) return;
    input.value = ''; input.style.height = 'auto';
    busy = true;
    addUserBubble(text);
    showTyping();
    try {
      const res  = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });
      const data = await res.json();
      hideTyping();
      addBubble(data.reply ?? data.error, data.backend ?? currentBackend);
      speak(data.reply ?? '');
    } catch {
      hideTyping();
      addBubble('Impossible de joindre Jarvis. Le serveur est-il démarré ?', currentBackend);
    }
    busy = false;
  }

  // ── Synthèse vocale ───────────────────────────────────────────────────────
  function speak(text) {
    if (!text || !window.speechSynthesis) return;
    speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'fr-FR';
    speechSynthesis.speak(utt);
  }

  // ── Reconnaissance vocale ─────────────────────────────────────────────────
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SR) {
    const rec = new SR();
    rec.lang = 'fr-FR';
    rec.interimResults = false;
    rec.onresult = e => {
      input.value = e.results[0][0].transcript;
      voiceBtn.classList.remove('listening');
      send();
    };
    rec.onerror = rec.onend = () => voiceBtn.classList.remove('listening');
    voiceBtn.addEventListener('click', () => {
      voiceBtn.classList.contains('listening') ? rec.stop()
        : (voiceBtn.classList.add('listening'), rec.start());
    });
  } else {
    voiceBtn.style.opacity = '0.3';
  }

  // ── Réinitialisation ──────────────────────────────────────────────────────
  resetBtn.addEventListener('click', async () => {
    if (!confirm('Effacer toute la conversation ?')) return;
    await fetch('/reset', { method: 'POST' });
    msgBox.innerHTML = '';
    addBubble('Conversation effacée.', currentBackend);
  });

  // ── PWA ───────────────────────────────────────────────────────────────────
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
</body>
</html>
