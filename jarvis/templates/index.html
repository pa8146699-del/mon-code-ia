<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Jarvis</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d1a;
      color: #e0e0e0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #111827;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1e3a5f;
      flex-shrink: 0;
    }

    header h1 { font-size: 1.15rem; color: #38bdf8; letter-spacing: 0.05em; }

    #reset-btn {
      background: transparent;
      border: 1px solid #374151;
      color: #9ca3af;
      padding: 5px 12px;
      border-radius: 14px;
      font-size: 0.75rem;
      cursor: pointer;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
    }

    .bubble {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 18px;
      line-height: 1.55;
      font-size: 0.93rem;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .bubble.user {
      background: #1e40af;
      color: #e0e0e0;
      align-self: flex-end;
      border-bottom-right-radius: 5px;
    }

    .bubble.jarvis {
      background: #111827;
      color: #e0e0e0;
      align-self: flex-start;
      border-bottom-left-radius: 5px;
      border: 1px solid #1e3a5f;
    }

    .bubble.jarvis .label {
      font-size: 0.68rem;
      color: #38bdf8;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 5px;
    }

    .typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 16px;
    }

    .typing span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #38bdf8;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.35; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    #input-area {
      padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      background: #111827;
      border-top: 1px solid #1e3a5f;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #message-input {
      flex: 1;
      background: #0d0d1a;
      border: 1px solid #1e3a5f;
      border-radius: 22px;
      padding: 10px 16px;
      color: #e0e0e0;
      font-size: 0.95rem;
      resize: none;
      max-height: 110px;
      outline: none;
      line-height: 1.4;
    }

    #message-input::placeholder { color: #4b5563; }

    .action-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
      transition: transform 0.1s, background 0.2s;
    }

    .action-btn:active { transform: scale(0.9); }

    #voice-btn { background: #1e3a5f; }
    #voice-btn.listening { background: #dc2626; animation: pulse 1s infinite; }

    #send-btn { background: #38bdf8; color: #000; font-size: 1rem; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.4); }
      50%       { box-shadow: 0 0 0 8px rgba(220,38,38,0); }
    }
  </style>
</head>
<body>

<header>
  <h1>⚡ JARVIS</h1>
  <button id="reset-btn">Nouvelle conv.</button>
</header>

<div id="messages">
  <div class="bubble jarvis">
    <div class="label">JARVIS</div>Bonjour ! Comment puis-je vous aider ?
  </div>
</div>

<div id="input-area">
  <button class="action-btn" id="voice-btn" title="Vocal">🎤</button>
  <textarea id="message-input" placeholder="Votre message…" rows="1"></textarea>
  <button class="action-btn" id="send-btn" title="Envoyer">▶</button>
</div>

<script>
  const msgBox  = document.getElementById('messages');
  const input   = document.getElementById('message-input');
  const sendBtn = document.getElementById('send-btn');
  const voiceBtn= document.getElementById('voice-btn');
  const resetBtn= document.getElementById('reset-btn');

  let busy = false;

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 110) + 'px';
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  sendBtn.addEventListener('click', send);

  function escape(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function addBubble(text, role) {
    const d = document.createElement('div');
    d.className = `bubble ${role}`;
    d.innerHTML = role === 'jarvis'
      ? `<div class="label">JARVIS</div>${escape(text)}`
      : escape(text);
    msgBox.appendChild(d);
    msgBox.scrollTop = msgBox.scrollHeight;
    return d;
  }

  function showTyping() {
    const d = document.createElement('div');
    d.className = 'bubble jarvis typing';
    d.id = 'typing';
    d.innerHTML = '<span></span><span></span><span></span>';
    msgBox.appendChild(d);
    msgBox.scrollTop = msgBox.scrollHeight;
  }

  function hideTyping() { document.getElementById('typing')?.remove(); }

  async function send() {
    const text = input.value.trim();
    if (!text || busy) return;

    input.value = '';
    input.style.height = 'auto';
    busy = true;

    addBubble(text, 'user');
    showTyping();

    try {
      const res  = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });
      const data = await res.json();
      hideTyping();
      addBubble(data.reply ?? data.error, 'jarvis');
      speak(data.reply ?? '');
    } catch {
      hideTyping();
      addBubble('Impossible de joindre Jarvis. Vérifiez qu\'Ollama est lancé.', 'jarvis');
    }

    busy = false;
  }

  // ── Synthèse vocale (navigateur) ──────────────────────────────────────────
  function speak(text) {
    if (!text || !window.speechSynthesis) return;
    speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'fr-FR';
    speechSynthesis.speak(utt);
  }

  // ── Reconnaissance vocale (navigateur) ───────────────────────────────────
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SR) {
    const rec = new SR();
    rec.lang = 'fr-FR';
    rec.interimResults = false;

    rec.onresult = e => {
      input.value = e.results[0][0].transcript;
      voiceBtn.classList.remove('listening');
      send();
    };
    rec.onerror = rec.onend = () => voiceBtn.classList.remove('listening');

    voiceBtn.addEventListener('click', () => {
      if (voiceBtn.classList.contains('listening')) {
        rec.stop();
      } else {
        voiceBtn.classList.add('listening');
        rec.start();
      }
    });
  } else {
    voiceBtn.style.opacity = '0.3';
    voiceBtn.title = 'Voix non disponible sur ce navigateur';
  }

  // ── Réinitialisation ──────────────────────────────────────────────────────
  resetBtn.addEventListener('click', async () => {
    await fetch('/reset', { method: 'POST' });
    msgBox.innerHTML = '';
    addBubble('Conversation réinitialisée. Comment puis-je vous aider ?', 'jarvis');
  });
</script>
</body>
</html>
